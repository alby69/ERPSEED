<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlaskERP - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">FlaskERP</span>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Welcome, <span id="userEmail">...</span></h2>
        <p class="text-muted">Role: <span id="userRole" class="badge bg-secondary">...</span></p>
        <hr>

        <!-- Sezione visibile solo agli Admin -->
        <div id="adminSection" class="d-none mt-4">
            <h4>User Management (Admin Area)</h4>
            <ul id="usersList" class="list-group mt-3">
                <!-- Lista utenti popolata via JS -->
            </ul>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('access_token');

        // Se non c'è token, torna al login
        if (!token) {
            window.location.href = 'login.html';
        }

        // Funzione per fare chiamate autenticate
        async function authFetch(url) {
            const response = await fetch(url, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (response.status === 401) {
                logout(); // Token scaduto o non valido
            }
            return response;
        }

        // Carica dati utente corrente
        async function loadProfile() {
            const response = await authFetch('http://localhost:5000/me');
            if (response.ok) {
                const user = await response.json();
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userRole').textContent = user.role;

                // Se è admin, carica la lista utenti
                if (user.role === 'admin') {
                    document.getElementById('adminSection').classList.remove('d-none');
                    loadUsersList();
                }
            }
        }

        // Carica lista utenti (Solo Admin)
        async function loadUsersList() {
            const response = await authFetch('http://localhost:5000/users');
            if (response.ok) {
                const users = await response.json();
                const list = document.getElementById('usersList');
                list.innerHTML = '';
                users.forEach(u => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    li.innerHTML = `${u.email} <span class="badge bg-primary rounded-pill">${u.role}</span>`;
                    list.appendChild(li);
                });
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = 'login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);

        // Avvio
        loadProfile();
    </script>
</body>
</html>
