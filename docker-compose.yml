services:
  db:
    image: postgres:15-alpine
    container_name: flaskerp_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=flaskerp
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    networks:
      - flaskerp_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    container_name: flaskerp_web
    build: .
    command: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:5000 --reload backend.wsgi:app
    volumes:
      - ./backend:/app/backend
      - ./migrations:/app/migrations
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/flaskerp
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flaskerp_net

  frontend:
    container_name: flaskerp_frontend
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - flaskerp_net

networks:
  flaskerp_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local