services:
  # Database PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: erpseed_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=flaskerp
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    networks:
      - erpseed_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis per cache e code
  redis:
    image: redis:7-alpine
    container_name: erpseed_redis
    ports:
      - "6380:6379"
    networks:
      - erpseed_net

  # Backend Flask - uses local files via volume
  backend:
    container_name: erpseed_backend
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./requirements.txt:/app/requirements.txt:ro
    ports:
      - "5002:5000"
    environment:
      - FLASK_APP=backend
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=postgresql://postgres:password@db:5432/flaskerp
      - SECRET_KEY=dev-secret-key-change-in-prod
      - JWT_SECRET_KEY=a-very-secure-and-long-jwt-secret-key-for-dev-env
    command: sh -c "pip install -r requirements.txt && flask run --host 0.0.0.0 --port 5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erpseed_net
    stdin_open: true
    tty: true

  # Frontend React/Vite - uses local files via volume
  frontend:
    container_name: erpseed_frontend
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5002
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - erpseed_net

networks:
  erpseed_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
