services:
  db:
    image: postgres:15-alpine
    container_name: erpseed_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=flaskerp
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    networks:
      - erpseed_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erpseed_redis
    ports:
      - "6380:6379"
    networks:
      - erpseed_net

  backend:
    container_name: erpseed_backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5002:5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=postgresql://postgres:password@db:5432/flaskerp
      - SECRET_KEY=dev-secret-key-change-in-prod
      - JWT_SECRET_KEY=a-very-secure-and-long-jwt-secret-key-for-dev-env
      - GIT_REPO_URL=https://github.com/alby69/ERPSEED.git
      - GIT_BRANCH=erpseed/backend
      - PROJECT_TYPE=backend
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erpseed_net
    stdin_open: true
    tty: true

  frontend:
    container_name: erpseed_frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5002
      - GIT_REPO_URL=https://github.com/alby69/ERPSEED.git
      - GIT_BRANCH=erpseed/frontend
      - PROJECT_TYPE=frontend
    depends_on:
      - backend
    networks:
      - erpseed_net

networks:
  erpseed_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
