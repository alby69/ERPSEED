services:
  # Database PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: erpseed_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=erpseed
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    networks:
      - erpseed_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis per cache e code
  redis:
    image: redis:7-alpine
    container_name: erpseed_redis
    ports:
      - "6380:6379"
    networks:
      - erpseed_net

  # Backend Flask
  backend:
    container_name: erpseed_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app/backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=backend
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=postgresql://postgres:password@db:5432/erpseed
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=dev-secret-key-change-in-prod
      - JWT_SECRET_KEY=a-very-secure-and-long-jwt-secret-key-for-dev-env
      - PYTHONPATH=/app
      # Imposta OPENROUTER_API_KEY (https://openrouter.ai/keys) oppure usa un altro provider con LLM_PROVIDER=openai/anthropic/ollama
      - OPENROUTER_API_KEY=set-your-key-here
    command: >
      sh -c "pip install -r /app/backend/requirements.txt &&
             cd /app && python -m backend.cli.create_admin admin@erpseed.it admin123 &&
             gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:5000 --reload backend.wsgi:app"
    depends_on:
      db:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    networks:
      - erpseed_net
    stdin_open: true
    tty: true

  # Frontend React/Vite
  frontend:
    container_name: erpseed_frontend
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - erpseed_net

  # Inizializzazione database (run once)
  init-db:
    container_name: erpseed_init
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app/backend
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/erpseed
      - JWT_SECRET_KEY=a-very-secure-and-long-jwt-secret-key-for-dev-env
      - PYTHONPATH=/app
    command: >
      sh -c "pip install -r /app/backend/requirements.txt &&
             cd /app && python -m backend.cli.create_admin admin@erpseed.it admin123 &&
             cd /app && python -m backend.seeds.seed_initial &&
             cd /app && python -m backend.seeds.seed_metadata &&
             cd /app && python -m backend.seeds.seed_comuni"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erpseed_net
    restart: "no"

networks:
  erpseed_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
